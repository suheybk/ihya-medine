<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e1a14">
<title>İhya — Evden Dünyaya</title>
<style>
  :root{
    --bg:#0c1510;          /* gece toprağı */
    --bg2:#10201a;
    --panel:#142a22;
    --panel2:#18342a;
    --line:#27483b;
    --ink:#e8efe6;          /* açık metin */
    --muted:#8fae9e;
    --gold:#d9a441;         /* kandil ışığı */
    --gold-soft:#e9c478;
    --green:#5fb98a;        /* hayat/diriliş */
    --green-deep:#2f8f63;
    --rose:#c97b6a;
    --shadow:0 10px 30px rgba(0,0,0,.45);
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #16302480 0%, transparent 60%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    color:var(--ink);
    overflow:hidden;
    user-select:none;
  }
  #app{
    max-width:480px;margin:0 auto;height:100dvh;
    display:flex;flex-direction:column;position:relative;
  }

  /* ---------- ÜST BAR ---------- */
  header{
    padding:14px 16px 10px;display:flex;align-items:center;gap:12px;
    background:linear-gradient(180deg,#0e1a1480,transparent);
  }
  .crest{
    width:38px;height:38px;border-radius:11px;flex:none;
    background:radial-gradient(circle at 35% 30%,var(--gold-soft),var(--gold) 60%,#9c6f1e);
    display:grid;place-items:center;color:#2a1c05;font-weight:800;font-size:19px;
    box-shadow:0 4px 14px #d9a44140, inset 0 1px 1px #fff6;
  }
  .titles{flex:1;min-width:0}
  .titles h1{margin:0;font-size:15px;letter-spacing:.5px;font-weight:700}
  .titles p{margin:1px 0 0;font-size:11px;color:var(--muted)}
  .nur{
    text-align:right;font-size:11px;color:var(--gold-soft);
  }
  .nur b{display:block;font-size:18px;color:var(--gold);line-height:1}

  /* ---------- DÖNGÜ / GÜN ---------- */
  .daystrip{
    margin:2px 16px 8px;padding:8px 12px;border-radius:14px;
    background:linear-gradient(90deg,#0f221a,#13291f);
    border:1px solid var(--line);
    display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted);
  }
  .sun{width:22px;height:22px;border-radius:50%;flex:none;
    background:radial-gradient(circle,var(--gold-soft),var(--gold));
    box-shadow:0 0 16px #d9a44188;transition:.6s}
  .sun.night{background:radial-gradient(circle,#cfe0ff,#86a8d6);box-shadow:0 0 16px #86a8d688}
  .daystrip .ph{color:var(--ink);font-weight:600}

  /* ---------- HARİTA / SAHNE ---------- */
  main{flex:1;overflow:hidden;position:relative}
  .scene{
    position:absolute;inset:0;padding:6px 16px 4px;
    display:flex;flex-direction:column;
  }
  .placecard{
    flex:none;border-radius:var(--r);padding:14px 16px;margin-bottom:10px;
    background:linear-gradient(135deg,var(--panel),var(--panel2));
    border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .placecard::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;
    background:radial-gradient(circle,#d9a44122,transparent 70%);pointer-events:none}
  .placecard .ph-name{font-size:13px;color:var(--gold-soft);font-weight:700;letter-spacing:.4px}
  .placecard .ph-title{font-size:20px;font-weight:800;margin:2px 0 8px}
  .progwrap{height:9px;border-radius:6px;background:#0c1c15;overflow:hidden;border:1px solid #0a1611}
  .progbar{height:100%;width:0;border-radius:6px;
    background:linear-gradient(90deg,var(--green-deep),var(--green));transition:width .5s ease}
  .progmeta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px}

  /* QUEST LİSTESİ */
  .quests{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
  .quests::-webkit-scrollbar{display:none}
  .q{
    display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:9px;
    border-radius:15px;background:#11261e;border:1px solid #1d3a2f;
    transition:transform .12s ease, opacity .3s ease;
  }
  .q:active{transform:scale(.985)}
  .q .ic{width:40px;height:40px;border-radius:12px;flex:none;display:grid;place-items:center;
    font-size:20px;background:#0e2018;border:1px solid #20402f}
  .q .body{flex:1;min-width:0}
  .q .body .nm{font-size:14px;font-weight:600}
  .q .body .src{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35}
  .q .body .src a{color:var(--gold-soft);text-decoration:none;border-bottom:1px dotted #d9a44166;cursor:pointer}
  .q .tick{width:30px;height:30px;border-radius:50%;flex:none;border:2px solid #2c5142;
    display:grid;place-items:center;color:transparent;transition:.2s;cursor:pointer;background:#0d1c16}
  .q.done{opacity:.5}
  .q.done .tick{background:var(--green-deep);border-color:var(--green);color:#06150e;font-weight:900}
  .q.done .nm{text-decoration:line-through;text-decoration-color:#5fb98a66}

  .done-tag{display:none}
  .q.done .done-tag{display:inline;color:var(--green);font-size:11px;margin-left:6px}

  /* FETİH BUTONU */
  .conquer{
    flex:none;margin:4px 0 2px;padding:15px;border:none;border-radius:16px;cursor:pointer;
    font-size:15px;font-weight:800;letter-spacing:.5px;color:#0c1a12;
    background:linear-gradient(135deg,var(--gold-soft),var(--gold));
    box-shadow:0 8px 22px #d9a44140;transition:.15s;
  }
  .conquer:active{transform:translateY(1px)}
  .conquer:disabled{background:#1c352a;color:#4d6a5c;box-shadow:none;cursor:default}

  /* ---------- ALT NAV ---------- */
  nav{
    flex:none;display:flex;background:#0c1812;border-top:1px solid var(--line);
    padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  }
  nav button{flex:1;background:none;border:none;color:var(--muted);padding:8px 0;
    font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
  nav button .ni{font-size:19px;filter:grayscale(.4);transition:.2s}
  nav button.active{color:var(--gold-soft)}
  nav button.active .ni{filter:none;transform:translateY(-1px)}

  /* ---------- HARİTA EKRANI ---------- */
  .map{position:absolute;inset:0;padding:14px 16px;overflow-y:auto;display:none;flex-direction:column;gap:10px}
  .map::-webkit-scrollbar{display:none}
  .maphead{font-size:13px;color:var(--muted);margin:2px 2px 4px}
  .realm{
    border-radius:16px;padding:14px 15px;border:1px solid var(--line);position:relative;overflow:hidden;
    background:linear-gradient(135deg,var(--panel),var(--panel2));
  }
  .realm.locked{opacity:.45;filter:saturate(.4)}
  .realm.active-realm{border-color:var(--gold);box-shadow:0 0 0 1px #d9a44155,var(--shadow)}
  .realm .emoji{font-size:26px}
  .realm .rn{font-size:16px;font-weight:800;margin:4px 0 2px}
  .realm .rd{font-size:11px;color:var(--muted)}
  .realm .badge{position:absolute;right:12px;top:12px;font-size:10px;font-weight:700;
    padding:4px 8px;border-radius:20px}
  .badge.lock{background:#1c241f;color:#6a8576}
  .badge.cur{background:var(--gold);color:#2a1c05}
  .badge.done{background:var(--green-deep);color:#eafff4}
  .rmini{height:6px;border-radius:4px;background:#0c1c15;margin-top:9px;overflow:hidden}
  .rmini i{display:block;height:100%;background:linear-gradient(90deg,var(--green-deep),var(--green))}

  /* ---------- MODAL (KAYNAK) ---------- */
  .veil{position:absolute;inset:0;background:#04090780;backdrop-filter:blur(3px);
    display:none;align-items:flex-end;z-index:40}
  .veil.show{display:flex}
  .sheet{
    width:100%;background:linear-gradient(180deg,#14302380,#11241c);
    border-top-left-radius:24px;border-top-right-radius:24px;border:1px solid var(--line);
    border-bottom:none;padding:8px 20px calc(24px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 40px #000a;animation:up .25s ease;max-height:80%;overflow-y:auto;
  }
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  .grip{width:40px;height:4px;border-radius:3px;background:#33564799;margin:8px auto 14px}
  .sheet .kic{font-size:30px}
  .sheet h3{margin:6px 0 2px;font-size:18px}
  .sheet .ksub{font-size:12px;color:var(--gold-soft);font-weight:600;margin-bottom:14px}
  .ref{margin-bottom:14px;padding:13px 14px;border-radius:14px;background:#0f221a;border:1px solid #1d3a2f}
  .ref .tag{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:700}
  .ref .txt{font-size:14px;line-height:1.6;margin-top:5px;color:#dcebdd}
  .ref .cite{font-size:11px;color:var(--muted);margin-top:6px}
  .closebtn{width:100%;padding:13px;border:none;border-radius:13px;cursor:pointer;
    background:#1c352a;color:var(--ink);font-size:14px;font-weight:700;margin-top:4px}

  /* TOAST */
  .toast{position:absolute;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);
    background:var(--gold);color:#2a1c05;padding:11px 18px;border-radius:14px;font-size:13px;
    font-weight:700;box-shadow:var(--shadow);opacity:0;transition:.3s;z-index:50;pointer-events:none;
    max-width:88%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* FETİH PARLAMASI */
  .flash{position:absolute;inset:0;background:radial-gradient(circle,#d9a44166,transparent 60%);
    opacity:0;pointer-events:none;z-index:30}
  .flash.go{animation:fl .8s ease}
  @keyframes fl{0%{opacity:0}30%{opacity:1}100%{opacity:0}}

  /* ---------- 3D SAHNE ---------- */
  .stage{
    flex:1;position:relative;border-radius:var(--r);overflow:hidden;margin-bottom:10px;
    border:1px solid var(--line);
    background:radial-gradient(120% 90% at 50% 0%, #16302488, #0c1510 72%);
  }
  .stage canvas{display:block;width:100%;height:100%;touch-action:none}
  .stage .loading{position:absolute;inset:0;display:grid;place-items:center;
    color:var(--muted);font-size:12px;letter-spacing:.3px;transition:opacity .4s}
  .stage .hint3d{position:absolute;left:0;right:0;bottom:7px;text-align:center;
    font-size:10px;color:#7fa28f99;pointer-events:none;letter-spacing:.3px}

  .dobtn{width:100%;padding:14px;border:none;border-radius:13px;cursor:pointer;margin-bottom:8px;
    font-size:15px;font-weight:800;color:#0c1a12;
    background:linear-gradient(135deg,var(--green),var(--green-deep));box-shadow:0 6px 18px #2f8f6333}
  .dobtn.undo{background:#1c352a;color:var(--ink);box-shadow:none}

  .hidden{display:none!important}
</style>

<!-- Three.js (ES module, CDN) -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">

  <header>
    <div class="crest">ن</div>
    <div class="titles">
      <h1>İHYA</h1>
      <p>Evden başla, dünyayı dirilt</p>
    </div>
    <div class="nur"><b id="nurVal">0</b>nûr</div>
  </header>

  <div class="daystrip">
    <div class="sun" id="sunDot"></div>
    <div>Gün <span id="dayNum" class="ph">1</span> · <span id="phaseName" class="ph">Sabah</span></div>
    <div style="margin-left:auto" id="streak">🔥 0</div>
  </div>

  <!-- OYUN EKRANI -->
  <main id="screenPlay">
    <div class="scene">
      <div class="placecard">
        <div class="ph-name" id="realmName">ODA</div>
        <div class="ph-title" id="realmTitle">Nefsin Odası</div>
        <div class="progwrap"><div class="progbar" id="realmBar"></div></div>
        <div class="progmeta"><span id="realmCount">0 / 0 fetih</span><span id="realmHint">Görevleri tamamla</span></div>
      </div>
      <div class="stage" id="stage">
        <canvas id="c3d"></canvas>
        <div class="loading" id="loading">Sahne diriltiliyor…</div>
        <div class="hint3d">Parıldayan nesnelere dokun · sürükle = bak</div>
      </div>
      <button class="conquer" id="conquerBtn" disabled>Burayı Fethet</button>
    </div>
    <div class="flash" id="flash"></div>
  </main>

  <!-- HARİTA EKRANI -->
  <div class="map" id="screenMap">
    <div class="maphead">İhya yolu — her mekânı fethettikçe yenisi açılır.</div>
    <div id="realmListMap"></div>
  </div>

  <nav>
    <button id="navPlay" class="active" onclick="showScreen('play')"><span class="ni">🕌</span>Görev</button>
    <button id="navMap" onclick="showScreen('map')"><span class="ni">🗺️</span>İhya Yolu</button>
  </nav>

  <div class="toast" id="toast"></div>

  <!-- KAYNAK MODALI -->
  <div class="veil" id="veil">
    <div class="sheet" id="sheet">
      <div class="grip"></div>
      <div class="kic" id="kIcon">📖</div>
      <h3 id="kTitle">Görev</h3>
      <div class="ksub" id="kSub">Delil ve tavsiye</div>
      <div id="kRefs"></div>
      <button class="dobtn" id="kDoBtn">Yaptım ✓</button>
      <button class="closebtn" onclick="closeSheet()">Kapat</button>
    </div>
  </div>

</div>

<script>
/* ============================================================
   İHYA — tek dosya oyun
   Veri: mekânlar (realms) → her mekânda questler → her quest'te
   sade hatırlatma + isteğe bağlı kaynak (ayet/hadis) kartı.
   İlerleme localStorage'a yazılır (tarayıcıda kalır).
   ============================================================ */

const DATA = {
  realms: [
    {
      id:"oda", name:"ODA", title:"Nefsin Odası",
      emoji:"🛏️", desc:"İhya buradan başlar: kendi gününü Allah'ın rızasına göre kur.",
      quests:[
        {id:"sabah", ic:"🌅", nm:"Sabah namazını kıl",
          rem:"Günü farzla aç; bereket fecirde başlar.",
          refs:[
            {tag:"Hadis", txt:"İki rekât sabah sünneti, dünya ve içindeki her şeyden hayırlıdır.", cite:"Müslim, Müsâfirîn 96"},
            {tag:"Ayet", txt:"Şüphesiz sabah namazı şahitlidir (melekler şahit olur).", cite:"İsrâ 17/78"}
          ]},
        {id:"dua", ic:"🤲", nm:"Sabah dualarını oku",
          rem:"Güne zikirle gir; gönlün gün boyu korunsun.",
          refs:[
            {tag:"Ayet", txt:"Kalpler ancak Allah'ı anmakla huzura erer.", cite:"Ra'd 13/28"},
            {tag:"Tavsiye", txt:"Sabah-akşam zikirleri (Âyetü'l-Kürsî, İhlâs, Muavvizeteyn) güne kalkan olur."}
          ]},
        {id:"tuvalet", ic:"🚪", nm:"Tuvalet âdâbını uygula",
          rem:"Girerken sol ayak + besmele; çıkarken sağ ayak + 'gufrâneke'.",
          refs:[
            {tag:"Hadis", txt:"Peygamber tuvaletten çıkınca 'Gufrâneke' (bağışlamanı dilerim) derdi.", cite:"Tirmizî, Tahâret 5"},
            {tag:"Tavsiye", txt:"Temizlik imanın yarısıdır — beden temizliği kalbe yansır."}
          ]},
        {id:"kuran", ic:"📖", nm:"Bir sayfa Kur'an oku/ezber",
          rem:"Her gün bir damla; yıl boyunca derya olur.",
          refs:[
            {tag:"Hadis", txt:"Sizin en hayırlınız Kur'an'ı öğrenen ve öğretendir.", cite:"Buhârî, Fedâilü'l-Kur'an 21"}
          ]},
        {id:"kuşluk", ic:"☀️", nm:"Kuşluk (duhâ) namazı",
          rem:"Güneş yükselince 2 rekât; günün şükür secdesi.",
          refs:[
            {tag:"Hadis", txt:"Her birinizin her eklemi için bir sadaka gerekir; kuşluk namazının iki rekâtı buna yeter.", cite:"Müslim, Müsâfirîn 84"}
          ]}
      ]
    },
    {
      id:"ev", name:"EV", title:"Hânenin İhyası",
      emoji:"🏠", desc:"Odanı dirilttin; şimdi hâneyi bir mescide çevir.",
      quests:[
        {id:"yemek", ic:"🍽️", nm:"Yemek âdâbı: besmele & şükür",
          rem:"Sağ elle, besmeleyle başla; 'elhamdülillah' ile bitir.",
          refs:[
            {tag:"Hadis", txt:"Yemeğe başlarken besmele çek, sağ elinle ve önünden ye.", cite:"Buhârî, Et'ime 2"}
          ]},
        {id:"aile", ic:"👨‍👩‍👦", nm:"Aileyle 10 dk Kur'an/sohbet",
          rem:"Evini ilim ve muhabbetle doldur; çocuk gördüğünü yapar.",
          refs:[
            {tag:"Hadis", txt:"İçinde Allah anılan ev ile anılmayan ev, diri ile ölü gibidir.", cite:"Müslim, Müsâfirîn 211"}
          ]},
        {id:"komsu", ic:"🤝", nm:"Bir komşuya/aileye iyilik",
          rem:"Bir tabak yemek, bir selam, bir yardım — hâneden taşan rahmet.",
          refs:[
            {tag:"Hadis", txt:"Cebrâil komşu hakkını o kadar tavsiye etti ki, mirasçı kılacak sandım.", cite:"Buhârî, Edeb 28"}
          ]},
        {id:"temiz", ic:"🧹", nm:"Evi temizle/düzenle",
          rem:"Allah temizdir, temizliği sever; düzen huzurun kapısıdır.",
          refs:[
            {tag:"Ayet", txt:"Allah çok tövbe edenleri ve çok temizlenenleri sever.", cite:"Bakara 2/222"}
          ]}
      ]
    },
    {
      id:"bahce", name:"BAHÇE", title:"Toprağın Bereketi",
      emoji:"🌳", desc:"Bir fidan dik, bir canlıya merhamet et — yeryüzünü ihyâ et.",
      quests:[
        {id:"fidan", ic:"🌱", nm:"Bir fidan dik / bitki sula",
          rem:"Kıyamet kopsa bile elindeki fidanı dik.",
          refs:[
            {tag:"Hadis", txt:"Bir müslüman ağaç diker de ondan insan, hayvan veya kuş yerse, bu onun için sadaka olur.", cite:"Buhârî, Hars 1"}
          ]},
        {id:"hayvan", ic:"🐈", nm:"Bir canlıya su/yem ver",
          rem:"Her canlıya yapılan iyilikte ecir vardır.",
          refs:[
            {tag:"Hadis", txt:"Susuz bir köpeğe su veren günahkâra Allah mağfiret etti.", cite:"Buhârî, Şirb 9"}
          ]},
        {id:"spor", ic:"💪", nm:"Spor / hareket et",
          rem:"Güçlü mümin, zayıf müminden Allah'a daha sevimlidir.",
          refs:[
            {tag:"Hadis", txt:"Güçlü mümin, zayıf müminden daha hayırlı ve Allah'a daha sevgilidir.", cite:"Müslim, Kader 34"}
          ]}
      ]
    },
    {
      id:"mahalle", name:"MAHALLE", title:"Komşuluk Cumhuru",
      emoji:"🏘️", desc:"Hâneden mahalleye taş; selâmı yay, hayrı çoğalt.",
      quests:[
        {id:"selam", ic:"✋", nm:"5 kişiye selam ver",
          rem:"Selamı yayın ki birbirinizi sevesiniz.",
          refs:[
            {tag:"Hadis", txt:"Birbirinizi sevmedikçe cennete giremezsiniz; selamı aranızda yayın.", cite:"Müslim, Îmân 93"}
          ]},
        {id:"sadaka", ic:"💛", nm:"Bir sadaka ver",
          rem:"Sadaka malı eksiltmez, bereket katar.",
          refs:[
            {tag:"Hadis", txt:"Sadaka maldan bir şey eksiltmez.", cite:"Müslim, Birr 69"}
          ]},
        {id:"yol", ic:"🧹", nm:"Yoldan eziyet kaldır",
          rem:"İmanın en alt şubesi: yoldan rahatsız edici şeyi gidermek.",
          refs:[
            {tag:"Hadis", txt:"İmanın yetmiş küsur şubesi vardır; en aşağısı yoldan eziyet veren şeyi kaldırmaktır.", cite:"Buhârî, Îmân 3"}
          ]}
      ]
    },
    {
      id:"cami", name:"CAMİ", title:"Cemaatin Kalbi",
      emoji:"🕌", desc:"Mahalleyi cemaatle bağla; namazı saf saf dirilt.",
      quests:[
        {id:"cemaat", ic:"🕌", nm:"Bir vakit cemaatle namaz",
          rem:"Cemaat namazı, tek başına kılınandan 27 derece üstündür.",
          refs:[
            {tag:"Hadis", txt:"Cemaatle namaz, tek başına kılınan namazdan yirmi yedi derece daha faziletlidir.", cite:"Buhârî, Ezân 30"}
          ]},
        {id:"ilim", ic:"📚", nm:"Bir ilim meclisine katıl",
          rem:"İlim yolunda yürüyene Allah cennet yolunu kolaylaştırır.",
          refs:[
            {tag:"Hadis", txt:"Kim ilim öğrenmek için bir yola girerse, Allah ona cennetin yolunu kolaylaştırır.", cite:"Müslim, Zikir 38"}
          ]},
        {id:"davet", ic:"💬", nm:"Birini hayra davet et",
          rem:"Bir kişinin hidayetine vesile olmak, dünyadan hayırlıdır.",
          refs:[

/* ---------- DURUM ---------- */
const SAVE_KEY = "ihya_save_v1";
let S = load() || {
  nur:0, day:1, streak:0, lastPlayed:null,
  realmIdx:0,
  done:{} // { realmId: { questId:true } }
};

function load(){
  try{ const r=localStorage.getItem(SAVE_KEY); return r?JSON.parse(r):null }catch(e){return null}
}
function save(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)) }catch(e){}
}

/* ---------- YARDIMCI ---------- */
const $ = s => document.querySelector(s);
function realm(){ return DATA.realms[S.realmIdx]; }
function doneMap(r){ return S.done[r.id] || (S.done[r.id]={}); }
function realmCompleted(r){
  const d = S.done[r.id]||{};
  return r.quests.every(q=>d[q.id]);
}
function countDone(r){
  const d = S.done[r.id]||{};
  return r.quests.filter(q=>d[q.id]).length;
}

/* ---------- GÜN/DÖNGÜ ---------- */
function todayStr(){ return new Date().toISOString().slice(0,10); }
function rollDayIfNeeded(){
  const t = todayStr();
  if(S.lastPlayed === t) return;
  if(S.lastPlayed){
    // ardışık gün mü?
    const prev = new Date(S.lastPlayed), now = new Date(t);
    const diff = Math.round((now-prev)/86400000);
    S.streak = (diff===1) ? S.streak+1 : 1;
    S.day += 1;
  } else {
    S.streak = 1;
  }
  S.lastPlayed = t;
  save();
}
function phase(){
  const h = new Date().getHours();
  if(h<7) return {n:"Fecir",night:true};
  if(h<11) return {n:"Kuşluk",night:false};
  if(h<16) return {n:"Öğle",night:false};
  if(h<19) return {n:"İkindi",night:false};
  if(h<21) return {n:"Akşam",night:true};
  return {n:"Yatsı",night:true};
}

/* ---------- RENDER ---------- */
function renderTop(){
  $("#nurVal").textContent = S.nur;
  $("#dayNum").textContent = S.day;
  $("#streak").textContent = "🔥 " + S.streak;
  const p = phase();
  $("#phaseName").textContent = p.n;
  $("#sunDot").classList.toggle("night", p.night);
}

function renderPlay(){
  const r = realm();
  $("#realmName").textContent = r.name;
  $("#realmTitle").textContent = r.title;
  const total = r.quests.length, done = countDone(r);
  $("#realmBar").style.width = (total? (done/total*100):0) + "%";
  $("#realmCount").textContent = done + " / " + total + " görev";
  $("#realmHint").textContent = realmCompleted(r) ? "Fethe hazır ✦" : "Nesnelere dokun";

  const cb = $("#conquerBtn");
  if(realmCompleted(r)){
    cb.disabled = false;
    cb.textContent = (S.realmIdx < DATA.realms.length-1) ? `${r.title} → Fethet` : "Dünyayı Mühürle ✦";
  } else {
    cb.disabled = true;
    cb.textContent = "Burayı Fethet";
  }
  // 3D sahneyi güncel duruma getir (modül yüklendiyse)
  if(window.Scene3D) window.Scene3D.sync();
}

function renderMap(){
  const box = $("#realmListMap");
  box.innerHTML = "";
  DATA.realms.forEach((r,i)=>{
    const completed = realmCompleted(r) && i<=S.realmIdx;
    const current = i===S.realmIdx;
    const locked = i>S.realmIdx;
    const total=r.quests.length, dn=countDone(r);
    const el=document.createElement("div");
    el.className="realm"+(locked?" locked":"")+(current?" active-realm":"");
    let badge = locked?`<span class="badge lock">🔒 Kilitli</span>`
              : (completed && !current)?`<span class="badge done">Fethedildi</span>`
              : current?`<span class="badge cur">Şimdi</span>`:"";
    el.innerHTML = `
      ${badge}
      <div class="emoji">${r.emoji}</div>
      <div class="rn">${r.title}</div>
      <div class="rd">${r.desc}</div>
      <div class="rmini"><i style="width:${locked?0:(dn/total*100)}%"></i></div>`;
    box.appendChild(el);
  });
}

/* ---------- ETKİLEŞİM ---------- */
function toggleQuest(qid){
  const r = realm(); const dm = doneMap(r);
  if(dm[qid]){ delete dm[qid]; }
  else { dm[qid]=true; S.nur += 10; toast("+10 nûr · "+phase().n); }
  save(); renderTop(); renderPlay();
}

function conquer(){
  const r = realm();
  if(!realmCompleted(r)) return;
  S.nur += 50;
  $("#flash").classList.remove("go"); void $("#flash").offsetWidth; $("#flash").classList.add("go");
  if(S.realmIdx < DATA.realms.length-1){
    S.realmIdx += 1;
    toast("✦ "+r.title+" fethedildi! +50 nûr · "+realm().title+" açıldı");
  } else {
    toast("✦ Dünya ihyâ edildi! Allah kabul etsin · +50 nûr");
  }
  save(); renderTop(); renderPlay(); renderMap();
}

/* ---------- KAYNAK SAYFASI ---------- */
function isDone(qid){ return !!doneMap(realm())[qid]; }

function openSheet(qid){
  const r = realm();
  const q = r.quests.find(x=>x.id===qid);
  if(!q) return;
  window._curQ = qid;
  $("#kIcon").textContent = q.ic;
  $("#kTitle").textContent = q.nm;
  $("#kSub").textContent = q.rem;
  const wrap = $("#kRefs"); wrap.innerHTML="";
  (q.refs||[]).forEach(rf=>{
    const d=document.createElement("div");
    d.className="ref";
    d.innerHTML=`<div class="tag">${rf.tag}</div><div class="txt">${rf.txt}</div>${rf.cite?`<div class="cite">— ${rf.cite}</div>`:""}`;
    wrap.appendChild(d);
  });
  updateDoBtn();
  $("#veil").classList.add("show");
}
function updateDoBtn(){
  const b=$("#kDoBtn"); if(!b) return;
  const d=isDone(window._curQ);
  b.textContent = d ? "Geri al ↺" : "Yaptım ✓";
  b.classList.toggle("undo", d);
}
function doQuest(){
  const qid = window._curQ; if(!qid) return;
  const was = isDone(qid);
  toggleQuest(qid);          // durum + nûr + renderTop + renderPlay(→3D sync)
  if(!was){ closeSheet(); }   // tamamlandıysa kapat ki nesnenin dirilişini gör
  else { updateDoBtn(); }
}
function closeSheet(){ $("#veil").classList.remove("show"); }
$("#veil").addEventListener("click", e=>{ if(e.target.id==="veil") closeSheet(); });

/* ---------- EKRAN GEÇİŞ ---------- */
function showScreen(which){
  const play = which==="play";
  $("#screenPlay").classList.toggle("hidden", !play);
  $("#screenMap").style.display = play ? "none" : "flex";
  $("#navPlay").classList.toggle("active", play);
  $("#navMap").classList.toggle("active", !play);
  if(!play) renderMap();
}

/* ---------- TOAST ---------- */
let toastTimer;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ---------- 3D KÖPRÜSÜ ---------- */
// Modül (Three.js) bu API üzerinden oyun durumunu okur/yazar.
window.IhyaAPI = {
  realm, doneMap, countDone, realmCompleted, isDone, toggleQuest,
  openSheet, phase, realmIndex:()=>S.realmIdx
};

/* ---------- BAŞLAT ---------- */
$("#conquerBtn").onclick = conquer;
$("#kDoBtn").onclick = doQuest;
rollDayIfNeeded();
renderTop(); renderPlay();
// her dakika başında güneş/fazı tazele
setInterval(renderTop, 60000);
// Three.js CDN yüklenemezse (çevrimdışı) sessiz kalma, haber ver
setTimeout(()=>{
  if(!window.Scene3D){
    const l=document.getElementById('loading');
    if(l){ l.style.display='grid'; l.style.opacity='1';
      l.textContent='3D yüklenemedi — internet bağlantısını kontrol et'; }
  }
}, 9000);
</script>

/* ---- base64 data-URL → ArrayBuffer ---- */
function b64ToBuf(dataURL){
  const b64 = dataURL.split(',')[1];
  const bin = atob(b64);
  const len = bin.length, u = new Uint8Array(len);
  for(let i=0;i<len;i++) u[i] = bin.charCodeAt(i);
  return u.buffer;
}

/* ---- kurulum ---- */
const canvas = document.getElementById('c3d');
const stage  = document.getElementById('stage');
const loadingEl = document.getElementById('loading');

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);

const target = new THREE.Vector3(0, 0.35, 0);
let camAz = 0.0, camEl = 0.6, camDist = 6.6;
function placeCam(){
  camera.position.set(
    target.x + camDist*Math.cos(camEl)*Math.sin(camAz),
    target.y + camDist*Math.sin(camEl),
    target.z + camDist*Math.cos(camEl)*Math.cos(camAz)
  );
  camera.lookAt(target);
}

/* ---- ışıklar ---- */
const hemi = new THREE.HemisphereLight(0xcfe8ff, 0x24302a, 0.8);
const dir  = new THREE.DirectionalLight(0xffe9c4, 1.0);
dir.position.set(3.5, 6, 3);
const fill = new THREE.DirectionalLight(0x7fa9ff, 0.25);
fill.position.set(-4, 2, -2);
scene.add(hemi, dir, fill);

/* ---- oda: zemin + 2 duvar ---- */
const GRAY = new THREE.Color(0x4a4f4c);
const FLOOR_ALIVE = new THREE.Color(0x2c5a45);
const WALL_ALIVE  = new THREE.Color(0x244038);

const floorMat = new THREE.MeshStandardMaterial({color:GRAY.clone(), roughness:.95, metalness:0});
const floor = new THREE.Mesh(new THREE.PlaneGeometry(16,16), floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

const wallMat = new THREE.MeshStandardMaterial({color:GRAY.clone().multiplyScalar(.7), roughness:1, metalness:0});
const wallB = new THREE.Mesh(new THREE.PlaneGeometry(16,7), wallMat);
wallB.position.set(0, 3.5, -5); scene.add(wallB);
const wallL = new THREE.Mesh(new THREE.PlaneGeometry(16,7), wallMat);
wallL.rotation.y = Math.PI/2; wallL.position.set(-5, 3.5, 0); scene.add(wallL);

/* ---- model şablonları ---- */
const templates = {};
let ready = false, pending = false;
const loader = new GLTFLoader();
function loadAll(){
  const keys = Object.keys(window.IHYA_MODELS||{});
  let n = 0;
  if(!keys.length){ console.warn('IHYA_MODELS bulunamadı'); finish(); return; }
  keys.forEach(k=>{
    try{
      loader.parse(b64ToBuf(window.IHYA_MODELS[k]), '', (gltf)=>{
        templates[k] = gltf.scene; if(++n===keys.length) finish();
      }, (err)=>{ console.warn('parse hata', k, err); if(++n===keys.length) finish(); });
    }catch(e){ console.warn('decode hata', k, e); if(++n===keys.length) finish(); }
  });
}
function finish(){
  ready = true;
  if(loadingEl){ loadingEl.style.opacity = '0'; setTimeout(()=>loadingEl.style.display='none',400); }
  sync();
}

/* ---- yardımcılar ---- */
function grayOf(c){ const l = c.r*0.3 + c.g*0.59 + c.b*0.11; return new THREE.Color(l,l,l); }

function fallbackGroup(){
  const g = new THREE.Group();
  const m = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5),
            new THREE.MeshStandardMaterial({color:0x8a6f3a, roughness:.8}));
  m.position.y = 0.25; g.add(m); return g;
}

function instance(key){
  const t = templates[key];
  const g = t ? t.clone(true) : fallbackGroup();
  const meshes = [];
  g.traverse(o=>{
    if(o.isMesh){
      o.material = o.material.clone();
      o.material.emissive = new THREE.Color(0xd9a441);
      o.material.emissiveIntensity = 0;
      meshes.push({mesh:o, orig:o.material.color.clone(), gray:grayOf(o.material.color)});
    }
  });
  // hepsini ~0.95m'e ölçekle (taban-merkez pivot zeminde kalır)
  const box = new THREE.Box3().setFromObject(g);
  const size = new THREE.Vector3(); box.getSize(size);
  const maxd = Math.max(size.x, size.y, size.z) || 1;
  g.scale.setScalar(0.95 / maxd);
  return {group:g, meshes};
}

/* ---- quest nesneleri ---- */
let objs = [];           // {qid, group, meshes, pad, padMat, baseY, done}
let curRealmId = null;
const raypads = [];      // raycast hedefleri

function clearObjs(){
  objs.forEach(o=> scene.remove(o.group));
  objs = []; raypads.length = 0;
}

function buildRealm(realm){
  clearObjs();
  curRealmId = realm.id;
  const qs = realm.quests, n = qs.length;
  const gap = Math.min(1.3, 4.2 / Math.max(1, n-1));
  camDist = 5.8 + n*0.5;                  // görev sayısına göre kamerayı geri çek (hepsi sığsın)
  const depth = Math.min(0.55, gap*0.5);
  qs.forEach((q,i)=>{
    const inst = instance(modelFor(q,i));
    const x = (i - (n-1)/2) * gap;
    const z = (i % 2 === 0) ? depth*0.5 : -depth;
    inst.group.position.set(x, 0, z);
    inst.group.rotation.y = (Math.random?0:0); // sabit
    // alt pad (parıltı halkası)
    const padMat = new THREE.MeshStandardMaterial({color:0xd9a441, emissive:0xd9a441, emissiveIntensity:.4, roughness:.6});
    const pad = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.55,0.05,20), padMat);
    pad.position.set(x, 0.025, z);
    const o = {qid:q.id, group:inst.group, meshes:inst.meshes, pad, padMat, baseY:0, done:false, t:i};
    scene.add(pad, inst.group);
    inst.group.userData.qid = q.id;
    pad.userData.qid = q.id;
    inst.group.traverse(m=>{ if(m.isMesh) m.userData.qid = q.id; });
    objs.push(o);
    raypads.push(inst.group, pad);
  });
}

/* ---- durum senkronu ---- */
function sync(){
  if(!ready){ pending = true; return; }
  const realm = API().realm();
  if(!realm) return;
  if(realm.id !== curRealmId) buildRealm(realm);

  const total = realm.quests.length;
  let done = 0;
  objs.forEach(o=>{
    const d = API().isDone(o.qid);
    o.done = d; if(d) done++;
    // dirilme: tamamlanınca renkli, değilse soluk gri
    o.meshes.forEach(m=>{
      m.mesh.material.color.copy(d ? m.orig : m.orig.clone().lerp(m.gray, 0.72));
    });
    o.padMat.color.set(d ? 0x2f8f63 : 0xd9a441);
    o.padMat.emissive.set(d ? 0x2f8f63 : 0xd9a441);
  });

  // ortam dirilişi: ilerledikçe oda griden yeşile/sıcağa döner
  const p = total ? done/total : 0;
  floorMat.color.copy(GRAY.clone().lerp(FLOOR_ALIVE, p));
  wallMat.color.copy(GRAY.clone().multiplyScalar(.7).lerp(WALL_ALIVE, p));

  // teşhis: kaç gerçek model, kaç fallback kutu kullanıldı
  window.__ihyaDbg = {
    templates: Object.keys(templates),
    objMeshCounts: objs.map(o=>o.meshes.length),
    fallbacks: objs.filter(o=>o.meshes.length<=1).length
  };

  // gündüz/gece ışığı
  const night = API().phase && API().phase().night;
  hemi.intensity = (night ? 0.45 : 0.85) + p*0.35;
  dir.intensity  = (night ? 0.5  : 1.0)  + p*0.4;
  dir.color.set(night ? 0xbcd0ff : 0xffe9c4);
}
window.Scene3D = { sync };

/* ---- dokunma/sürükleme ---- */
let down=null, dragged=false;
function ndc(e){
  const r = canvas.getBoundingClientRect();
  return { x:((e.clientX-r.left)/r.width)*2-1, y:-((e.clientY-r.top)/r.height)*2+1 };
}
canvas.addEventListener('pointerdown', e=>{
  down = {x:e.clientX, y:e.clientY, az:camAz, el:camEl, t:Date.now()};
  dragged=false; canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e=>{
  if(!down) return;
  const dx = e.clientX-down.x, dy = e.clientY-down.y;
  if(Math.abs(dx)+Math.abs(dy) > 6) dragged=true;
  camAz = down.az - dx*0.005;
  camEl = Math.max(0.18, Math.min(1.05, down.el + dy*0.004));
  camAz = Math.max(-0.9, Math.min(0.9, camAz));
});
canvas.addEventListener('pointerup', e=>{
  const quick = down && (Date.now()-down.t < 400);
  down = null;
  if(dragged || !quick) return;
  const ray = new THREE.Raycaster();
  ray.setFromCamera(new THREE.Vector2(ndc(e).x, ndc(e).y), camera);
  const hits = ray.intersectObjects(raypads, true);
  if(hits.length){
    let o = hits[0].object;
    while(o && !o.userData.qid) o = o.parent;
    if(o && o.userData.qid) API().openSheet(o.userData.qid);
  }
});

/* ---- boyutlandırma ---- */
function resize(){
  const w = stage.clientWidth||1, h = stage.clientHeight||1;
  renderer.setSize(w, h, false);
  camera.aspect = w/h; camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(stage);
resize();

/* ---- animasyon ---- */
const clock = new THREE.Clock();
function loop(){
  const t = clock.getElapsedTime();
  objs.forEach((o,i)=>{
    const ph = t*1.6 + i*0.7;
    if(!o.done){
      // davet eden parıltı + hafif salınım + yavaş dönüş
      const glow = 0.25 + 0.2*Math.sin(ph);
      o.meshes.forEach(m=> m.mesh.material.emissiveIntensity = glow);
      o.padMat.emissiveIntensity = 0.3 + 0.25*Math.sin(ph);
      o.group.position.y = o.baseY + 0.05 + 0.04*Math.sin(ph);
      o.group.rotation.y += 0.004;
    } else {
      o.meshes.forEach(m=> m.mesh.material.emissiveIntensity *= 0.9);
      o.padMat.emissiveIntensity = 0.15;
      o.group.position.y += (o.baseY - o.group.position.y)*0.1;
    }
  });
  placeCam();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

loadAll();
loop();
if(pending) sync();
</script>
</body>
</html>
